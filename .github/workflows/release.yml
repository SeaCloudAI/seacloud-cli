name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract tag metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate package.json version matches tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version mismatch: package.json=${PKG_VERSION}, tag=${TAG_VERSION}"
            exit 1
          fi

  release:
    needs: validate
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve release endpoints
        env:
          INPUT_SEACLOUD_BASE_URL: ${{ vars.SEACLOUD_BASE_URL }}
          INPUT_SEACLOUD_MODELS_URL: ${{ vars.SEACLOUD_MODELS_URL }}
          INPUT_SEACLOUD_GENERATION_URL: ${{ vars.SEACLOUD_GENERATION_URL }}
          INPUT_SEACLOUD_SKILLHUB_URL: ${{ vars.SEACLOUD_SKILLHUB_URL }}
          INPUT_SEACLOUD_FOLKOS_PROXY_URL: ${{ vars.SEACLOUD_FOLKOS_PROXY_URL }}
        run: |
          echo "SEACLOUD_BASE_URL=${INPUT_SEACLOUD_BASE_URL:-https://vtrix.ai}" >> "$GITHUB_ENV"
          echo "SEACLOUD_MODELS_URL=${INPUT_SEACLOUD_MODELS_URL:-https://cloud-model-spec.vtrix.ai}" >> "$GITHUB_ENV"
          echo "SEACLOUD_GENERATION_URL=${INPUT_SEACLOUD_GENERATION_URL:-https://vtrix.ai}" >> "$GITHUB_ENV"
          echo "SEACLOUD_SKILLHUB_URL=${INPUT_SEACLOUD_SKILLHUB_URL:-https://skill-hub.vtrix.ai/api/v1}" >> "$GITHUB_ENV"
          echo "SEACLOUD_FOLKOS_PROXY_URL=${INPUT_SEACLOUD_FOLKOS_PROXY_URL:-http://folkos-gateway.dev.folkos.ai/folkos-proxy}" >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Print Node and npm versions
        run: |
          node --version
          npm --version

      - name: Resolve release endpoints
        env:
          INPUT_SEACLOUD_BASE_URL: ${{ vars.SEACLOUD_BASE_URL }}
          INPUT_SEACLOUD_MODELS_URL: ${{ vars.SEACLOUD_MODELS_URL }}
          INPUT_SEACLOUD_GENERATION_URL: ${{ vars.SEACLOUD_GENERATION_URL }}
          INPUT_SEACLOUD_SKILLHUB_URL: ${{ vars.SEACLOUD_SKILLHUB_URL }}
          INPUT_SEACLOUD_FOLKOS_PROXY_URL: ${{ vars.SEACLOUD_FOLKOS_PROXY_URL }}
        run: |
          echo "SEACLOUD_BASE_URL=${INPUT_SEACLOUD_BASE_URL:-https://vtrix.ai}" >> "$GITHUB_ENV"
          echo "SEACLOUD_MODELS_URL=${INPUT_SEACLOUD_MODELS_URL:-https://cloud-model-spec.vtrix.ai}" >> "$GITHUB_ENV"
          echo "SEACLOUD_GENERATION_URL=${INPUT_SEACLOUD_GENERATION_URL:-https://vtrix.ai}" >> "$GITHUB_ENV"
          echo "SEACLOUD_SKILLHUB_URL=${INPUT_SEACLOUD_SKILLHUB_URL:-https://skill-hub.vtrix.ai/api/v1}" >> "$GITHUB_ENV"
          echo "SEACLOUD_FOLKOS_PROXY_URL=${INPUT_SEACLOUD_FOLKOS_PROXY_URL:-http://folkos-gateway.dev.folkos.ai/folkos-proxy}" >> "$GITHUB_ENV"

      - name: Build bundled npm binaries
        run: ./scripts/build.sh && npm run prepare:npm-bundles

      - name: Preview npm package contents
        run: npm pack --dry-run

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
